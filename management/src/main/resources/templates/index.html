<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .report-card {
            background-color: #f8f9fa;
            border-left: 5px solid #0d6efd;
        }
    </style>
</head>
<body class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white p-3">
            <h2 class="text-center mb-0">Student Management System</h2>
        </div>
        <div class="card-body">
            
            <div class="row mb-4 align-items-center">
                <div class="col-md-7">
                    <form th:action="@{/search}" method="get" class="d-flex">
                        <input type="text" name="name" class="form-control me-2" placeholder="Search by name..." required>
                        <button type="submit" class="btn btn-primary">Search</button>
                        <a th:href="@{/}" class="btn btn-outline-secondary ms-2">Reset</a>
                    </form>
                </div>
                <div class="col-md-5 text-end">
                    <a th:href="@{/showNewStudentForm}" class="btn btn-success px-4">Add New Student</a>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover table-striped border">
                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Marks</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student : ${listStudents}">
                            <td th:text="${student.name}" class="fw-bold"></td>
                            <td th:text="${student.email}"></td>
                            <td th:text="${student.marks}"></td>
                            <td class="text-center">
                                <a th:href="@{/showFormForUpdate/{id}(id=${student.id})}" 
                                   class="btn btn-warning btn-sm mx-1">Update</a>
                                <a th:href="@{/deleteStudent/{id}(id=${student.id})}" 
                                   class="btn btn-danger btn-sm mx-1"
                                   onclick="return confirm('Delete this record?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(listStudents)}" class="text-center py-4 text-muted">
                <p>No students found. Start by adding one!</p>
            </div>

            <div class="row mt-4 pt-3 border-top">
                <div class="col-md-12">
                    <div class="p-3 report-card rounded shadow-sm">
                        <h5 class="text-primary"><i class="bi bi-bar-chart"></i> System Report</h5>
                        <div class="d-flex gap-5 mt-2">
                            <div>
                                <span class="text-muted">Total Students:</span>
                                <h4 th:text="${totalStudents}" class="mb-0">0</h4>
                            </div>
                            <div>
                                <span class="text-muted">Class Average Marks:</span>
                                <h4 th:text="${averageMarks}" class="mb-0">0.00</h4>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <p class="text-center mt-4 text-muted small">Java Spring Boot + H2 Database Project</p>
</body>
</html>
