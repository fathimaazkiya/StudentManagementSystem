<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3>Add New Student</h3>
                </div>
                <div class="card-body">
                    <form action="#" th:action="@{/saveStudent}" th:object="${student}" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Enter name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Marks</label>
                            <input type="number" th:field="*{marks}" class="form-control" placeholder="0-100">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Student</button>
                    </form>
                    <hr>
                    <a th:href="@{/}" class="btn btn-secondary btn-sm">Back to List</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
